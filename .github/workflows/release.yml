# Generated from xtask::workflows::release
# Rebuild with `cargo xtask workflows`.
name: release
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
on:
  push:
    tags:
    - v*-pre
permissions:
  contents: write
jobs:
  bundle_mac_preview:
    if: github.repository_owner == 'currybab'
    runs-on: macos-latest
    env:
      CARGO_TARGET_DIR: target
      SUPERZET_RELEASE_CHANNEL: preview
      SUPERZET_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      SUPERZET_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      SUPERZET_APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
      SUPERZET_APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
      SUPERZET_APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
      SUPERZET_MACOS_SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
    steps:
    - name: steps::checkout_repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        clean: false
    - name: steps::setup_node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'
    - name: steps::clear_target_dir_if_large
      run: ./script/clear-target-dir-if-larger-than 300
    - name: release::bundle_mac_preview
      run: ./script/bundle-mac aarch64-apple-darwin
    - name: '@actions/upload-artifact superzet-aarch64.dmg'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
      with:
        name: superzet-aarch64.dmg
        path: target/aarch64-apple-darwin/release/superzet-aarch64.dmg
        if-no-files-found: error
    timeout-minutes: 360
  bundle_linux_remote_server_preview_x86_64:
    if: github.repository_owner == 'currybab'
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: 0
      SUPERZET_CLIENT_CHECKSUM_SEED: ${{ secrets.ZED_CLIENT_CHECKSUM_SEED }}
      SUPERZET_MINIDUMP_ENDPOINT: ${{ secrets.ZED_SENTRY_MINIDUMP_ENDPOINT }}
      ZED_CLIENT_CHECKSUM_SEED: ${{ secrets.ZED_CLIENT_CHECKSUM_SEED }}
      ZED_MINIDUMP_ENDPOINT: ${{ secrets.ZED_SENTRY_MINIDUMP_ENDPOINT }}
      SUPERZET_RELEASE_CHANNEL: preview
      CC: clang-18
      CXX: clang++-18
    steps:
    - name: steps::checkout_repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        clean: false
    - name: steps::setup_linux
      run: ./script/linux
    - name: steps::install_mold
      run: ./script/install-mold
    - name: steps::download_wasi_sdk
      run: ./script/download-wasi-sdk
    - name: release::bundle_linux_remote_server_preview
      run: |
        if ! command -v zig >/dev/null 2>&1; then
          case "$(uname -m)" in
            x86_64) zig_arch=x86_64 ;;
            aarch64|arm64) zig_arch=aarch64 ;;
            *)
              echo "Unsupported architecture for Zig bootstrap: $(uname -m)" >&2
              exit 1
              ;;
          esac
          zig_root="$(mktemp -d)"
          curl -fsSL "https://ziglang.org/download/0.14.1/zig-${zig_arch}-linux-0.14.1.tar.xz" -o "${zig_root}/zig.tar.xz"
          tar -xJf "${zig_root}/zig.tar.xz" -C "${zig_root}" --strip-components=1
          export PATH="${zig_root}:$PATH"
        fi
        if ! command -v cargo-zigbuild >/dev/null 2>&1; then
          cargo install --locked cargo-zigbuild
        fi
        rustup target add "x86_64-unknown-linux-musl"
        export RUSTFLAGS="${RUSTFLAGS:-} -C target-feature=+crt-static"
        cargo zigbuild --release --target "x86_64-unknown-linux-musl" --package remote_server
        objcopy --strip-debug "target/x86_64-unknown-linux-musl/release/remote_server"
        gzip -f --stdout --best "target/x86_64-unknown-linux-musl/release/remote_server" > "target/superzet-remote-server-linux-x86_64.gz"
    - name: '@actions/upload-artifact superzet-remote-server-linux-x86_64.gz'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
      with:
        name: superzet-remote-server-linux-x86_64.gz
        path: target/superzet-remote-server-linux-x86_64.gz
        if-no-files-found: error
    timeout-minutes: 60
  bundle_linux_remote_server_preview_aarch64:
    if: github.repository_owner == 'currybab'
    runs-on: ubuntu-24.04-arm
    env:
      CARGO_INCREMENTAL: 0
      SUPERZET_CLIENT_CHECKSUM_SEED: ${{ secrets.ZED_CLIENT_CHECKSUM_SEED }}
      SUPERZET_MINIDUMP_ENDPOINT: ${{ secrets.ZED_SENTRY_MINIDUMP_ENDPOINT }}
      ZED_CLIENT_CHECKSUM_SEED: ${{ secrets.ZED_CLIENT_CHECKSUM_SEED }}
      ZED_MINIDUMP_ENDPOINT: ${{ secrets.ZED_SENTRY_MINIDUMP_ENDPOINT }}
      SUPERZET_RELEASE_CHANNEL: preview
      CC: clang-18
      CXX: clang++-18
    steps:
    - name: steps::checkout_repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        clean: false
    - name: steps::setup_linux
      run: ./script/linux
    - name: steps::install_mold
      run: ./script/install-mold
    - name: steps::download_wasi_sdk
      run: ./script/download-wasi-sdk
    - name: release::bundle_linux_remote_server_preview
      run: |
        if ! command -v zig >/dev/null 2>&1; then
          case "$(uname -m)" in
            x86_64) zig_arch=x86_64 ;;
            aarch64|arm64) zig_arch=aarch64 ;;
            *)
              echo "Unsupported architecture for Zig bootstrap: $(uname -m)" >&2
              exit 1
              ;;
          esac
          zig_root="$(mktemp -d)"
          curl -fsSL "https://ziglang.org/download/0.14.1/zig-${zig_arch}-linux-0.14.1.tar.xz" -o "${zig_root}/zig.tar.xz"
          tar -xJf "${zig_root}/zig.tar.xz" -C "${zig_root}" --strip-components=1
          export PATH="${zig_root}:$PATH"
        fi
        if ! command -v cargo-zigbuild >/dev/null 2>&1; then
          cargo install --locked cargo-zigbuild
        fi
        rustup target add "aarch64-unknown-linux-musl"
        export RUSTFLAGS="${RUSTFLAGS:-} -C target-feature=+crt-static"
        cargo zigbuild --release --target "aarch64-unknown-linux-musl" --package remote_server
        objcopy --strip-debug "target/aarch64-unknown-linux-musl/release/remote_server"
        gzip -f --stdout --best "target/aarch64-unknown-linux-musl/release/remote_server" > "target/superzet-remote-server-linux-aarch64.gz"
    - name: '@actions/upload-artifact superzet-remote-server-linux-aarch64.gz'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
      with:
        name: superzet-remote-server-linux-aarch64.gz
        path: target/superzet-remote-server-linux-aarch64.gz
        if-no-files-found: error
    timeout-minutes: 60
  publish_preview_release:
    needs:
    - bundle_mac_preview
    - bundle_linux_remote_server_preview_x86_64
    - bundle_linux_remote_server_preview_aarch64
    if: github.repository_owner == 'currybab'
    runs-on: ubuntu-24.04
    steps:
    - name: release::download_workflow_artifacts
      uses: actions/download-artifact@70fc10eb3fdc3a884b88c9f72e79bb36de8d0f6e
      with:
        path: ./artifacts/
    - name: ls -lR ./artifacts
      run: ls -lR ./artifacts
    - name: release::publish_preview_release
      run: |
        mkdir -p release-artifacts
        cp "./artifacts/superzet-aarch64.dmg/superzet-aarch64.dmg" "release-artifacts/superzet-aarch64.dmg"
        cp "./artifacts/superzet-remote-server-linux-x86_64.gz/superzet-remote-server-linux-x86_64.gz" "release-artifacts/superzet-remote-server-linux-x86_64.gz"
        cp "./artifacts/superzet-remote-server-linux-aarch64.gz/superzet-remote-server-linux-aarch64.gz" "release-artifacts/superzet-remote-server-linux-aarch64.gz"
        shasum -a 256 "release-artifacts/superzet-aarch64.dmg" > "release-artifacts/sha256sums.txt"

        if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --prerelease \
            --generate-notes
        fi

        gh release upload "$GITHUB_REF_NAME" \
          --repo "$GITHUB_REPOSITORY" \
          --clobber \
          release-artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'main' && github.sha || 'anysha' }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -euxo pipefail {0}
